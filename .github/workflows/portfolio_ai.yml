name: Portfolio AI Daily Analysis

on:
  schedule:
    - cron: '15 10 * * 1-5'
    - cron: '0 4 * * 6'
    - cron: '15 10 28-31 * 1-5'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth yfinance ta groq flask pandas openpyxl requests

      - name: Create credentials file
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Create config file
        run: |
          cat > config.py << 'EOF'
          import os
          EMAIL_SENDER          = os.environ.get("EMAIL_SENDER", "")
          EMAIL_PASSWORD        = os.environ.get("EMAIL_PASSWORD", "")
          EMAIL_RECEIVER        = os.environ.get("EMAIL_RECEIVER", "")
          GROQ_API_KEY          = os.environ.get("GROQ_API_KEY", "")
          GROQ_MODEL            = "llama-3.3-70b-versatile"
          GEMINI_API_KEY        = ""
          ALPHA_VANTAGE_KEY     = os.environ.get("ALPHA_VANTAGE_KEY", "")
          GOOGLE_SHEET_ID       = os.environ.get("GOOGLE_SHEET_ID", "")
          GOOGLE_CREDENTIALS_FILE = "credentials.json"
          USE_GOOGLE_SHEETS     = True
          SELL_LOSS_THRESHOLD   = -20
          SELL_PROFIT_THRESHOLD = 70
          RUN_HOUR              = 15
          RUN_MINUTE            = 45
          NSE_SUFFIX            = ".NS"
          HOLDINGS              = []
          HOLDINGS_SHEET        = "Sheet1"
          PNL_SHEET             = "Sheet3"
          EXCEL_FILE_PATH       = ""
          EOF

      - name: Run Portfolio AI
        env:
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:    ${{ secrets.EMAIL_RECEIVER }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
        run: python main.py

      - name: Deploy dashboard to GitHub Pages
        run: |
          cp index.html portfolio_data_temp.json 2>/dev/null || true
          # Copy last_analysis.json as portfolio_data.json for dashboard
          if [ -f last_analysis.json ]; then
            cp last_analysis.json portfolio_data.json
          fi
          git config user.name "Portfolio AI Bot"
          git config user.email "bot@portfolio-ai.com"
          git add portfolio_data.json || true
          git diff --staged --quiet || git commit -m "Update portfolio data $(date '+%Y-%m-%d %H:%M')"
          git push || true
