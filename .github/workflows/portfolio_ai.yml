name: Portfolio AI Daily Analysis

on:
  schedule:
    # Runs at 10:15 AM UTC = 3:45 PM IST every day
    - cron: '15 10 * * 1-5'
    # Runs at 4:00 AM UTC = 9:30 AM IST every Saturday (weekly summary)
    - cron: '0 4 * * 6'
    # Runs at 10:15 AM UTC = 3:45 PM IST on last day of month
    - cron: '15 10 28-31 * 1-5'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth yfinance ta groq flask pandas openpyxl requests

      - name: Create credentials file
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Create config file
        run: |
          cat > config.py << 'EOF'
          import os

          # Email
          EMAIL_SENDER   = os.environ.get("EMAIL_SENDER", "")
          EMAIL_PASSWORD = os.environ.get("EMAIL_PASSWORD", "")
          EMAIL_RECEIVER = os.environ.get("EMAIL_RECEIVER", "")

          # AI APIs
          GROQ_API_KEY   = os.environ.get("GROQ_API_KEY", "")
          GROQ_MODEL     = "llama-3.3-70b-versatile"
          GEMINI_API_KEY = ""

          # Alpha Vantage
          ALPHA_VANTAGE_KEY = os.environ.get("ALPHA_VANTAGE_KEY", "")

          # Google Sheets
          GOOGLE_SHEET_ID         = os.environ.get("GOOGLE_SHEET_ID", "")
          GOOGLE_CREDENTIALS_FILE = "credentials.json"
          USE_GOOGLE_SHEETS       = True

          # Trading Rules
          SELL_LOSS_THRESHOLD   = -20
          SELL_PROFIT_THRESHOLD = 70

          # Schedule
          RUN_HOUR   = 15
          RUN_MINUTE = 45

          # NSE
          NSE_SUFFIX = ".NS"

          # Holdings (fallback only)
          HOLDINGS = []

          # Sheet names
          HOLDINGS_SHEET = "Sheet1"
          PNL_SHEET      = "Sheet3"
          EOF

      - name: Run Portfolio AI
        env:
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:    ${{ secrets.EMAIL_RECEIVER }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python main.py
